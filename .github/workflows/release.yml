name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: windows
          - os: macos-latest
            artifact: macos
          - os: ubuntu-latest
            artifact: linux

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - uses: actions/checkout@v4

      # ── Linux 系统依赖 ──────────────────────────────────────────
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            libfuse2 dpkg-dev fakeroot

      # ── Python 后端 ─────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build Python backend (PyInstaller)
        run: python scripts/build-backend.py

      # ── Electron 前端 ────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Build Electron frontend
        run: |
          cd desktop
          npm install
          npm run build

      # ── 打包 ────────────────────────────────────────────────────
      - name: Package (electron-builder)
        env:
          GH_TOKEN: ''
          EP_GH_TOKEN: ''
        run: |
          cd desktop
          if [ "$RUNNER_OS" = "Linux" ]; then
            npx electron-builder --config electron-builder.yml --linux AppImage --publish never 2>&1
          else
            npx electron-builder --config electron-builder.yml --publish never 2>&1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            desktop/release/*.exe
            desktop/release/*.dmg
            desktop/release/*.AppImage
            desktop/release/*.deb
            desktop/release/*.blockmap
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: artifacts
          merge-multiple: true

      - run: ls -la artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
